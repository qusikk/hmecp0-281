<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product-create</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
  <include id="header" src="../../components/header/header-component.html"></include>

  <div class="content min-h-screen flex items-center justify-center">
    <form class="w-[650px] p-3 space-y-3">
      <h2 class="font-medium text-4xl text-center">Create product</h2>

      <p>Brand</p>
      <input type="text" class="w-full bg-white border border-gray-200 rounded-md px-1 py-2">

      <p>Model</p>
      <input type="text" class="w-full bg-white border border-gray-200 rounded-md px-1 py-2">

      <p>Category</p>
      <input type="text" class="w-full bg-white border border-gray-200 rounded-md px-1 py-2">

      <p>Description</p>
      <textarea class="w-full bg-white border border-gray-200 rounded-md px-1 py-2"></textarea>

      <p>Price</p>
      <input type="text" class="w-full bg-white border border-gray-200 rounded-md px-1 py-2">

      <p>Rating</p>
      <input type="text" class="w-full bg-white border border-gray-200 rounded-md px-1 py-2">

      <p>Image URL</p>
      <input type="text" class="w-full bg-white border border-gray-200 rounded-md px-1 py-2">
    
      <input type="image">

      <div class="flex space-x-1">
        <button class="bg-blue-500 w-[65px] h-[40px] rounded-lg text-white cursor-pointer hover:bg-blue-600">Save</button>
        <button class="bg-yellow-500 w-[65px] h-[40px] rounded-lg text-black cursor-pointer hover:bg-yellow-600">Reset</button>
      </div>

    </form>
  </div>

  <include id="footer" src="../../components/footer/footer-component.html"></include>
  <script type="module" src="../../utils/include.js"></script>
</body>
</html>
